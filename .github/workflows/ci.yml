name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        # Only 'requests' and pytest are needed for the backend tests; the GTK
        # GUI layer is not imported (device access is mocked), so PyGObject and
        # a display server are intentionally not required here.
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests

      - name: Run tests
        run: pytest -q

      - name: Byte-compile all sources
        run: python -m compileall src
